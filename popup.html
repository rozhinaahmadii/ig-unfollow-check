<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IG Unfollow Check</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
      color: #0a0a0a;
      padding-bottom: 10px;
    }
    .header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-text h1 { font-size: 14px; font-weight: 600; line-height: 1.2; }
    .header-text p { font-size: 11px; margin-top: 1px; }
    
    .body { padding: 14px 20px; }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fafafa;
      border: 1px solid #f0f0f0;
      margin-bottom: 12px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #d4d4d4; flex-shrink: 0; }
    .dot.green { background: #22c55e; }
    .dot.red   { background: #ef4444; }
    .status-text { font-size: 12px; color: #525252; }

    .info-trigger {
      font-size: 12px;
      color: #737373;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 12px;
      padding: 2px 0;
    }
    .info-trigger:hover { color: #0095f6; }
    .info-content {
      display: none;
      font-size: 11px;
      color: #666;
      background: #f9f9f9;
      border: 1px dashed #e5e5e5;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 14px;
      line-height: 1.4;
    }
    .info-content ul { margin-left: 14px; margin-top: 4px; }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      text-align: center;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #0095f6; color: #fff; }
    .btn-primary:disabled { background: #cccccc; cursor: not-allowed; }
    .btn-secondary { background: #f5f5f5; color: #0a0a0a; margin-top: 8px; }
    
  </style>
</head>
<body>
  <div class="header">
  <img src="icon.png" alt="Logo" style="width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;" />
  
  <div class="header-text">
    <h1>IG Unfollow Check</h1>
    <p><a href="https://github.com/rozhinaahmadii/ig-unfollow-check" id="gh-link" style="color:#0095f6; text-decoration:none;">View source on GitHub ↗</a></p>
  </div>
  </div>

  <div class="body">
    <div class="status-row">
      <div class="dot" id="dot"></div>
      <span class="status-text" id="status-text">Checking context…</span>
    </div>

    <button class="btn btn-primary" id="main-btn" disabled>Open on Instagram first</button>
    <button class="btn btn-secondary" id="open-ig-btn">Go to Instagram→</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
